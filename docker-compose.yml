services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB" ]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build: .
    command: alembic upgrade head
    env_file: .env
    environment:
      POSTGRES_HOST: db
    depends_on:
      db:
        condition: service_healthy

  mcp:
    build: .
    command: uv run app/core/mcp/server/server.py
    env_file: .env
    ports:
      - "6969:6969"
    volumes:
      - ./app:/app/app # hot-reload MCP server source
    restart: unless-stopped
    healthcheck:
      # TCP check: just verify port 6969 is open (more reliable than HTTP GET for FastMCP)
      test: [ "CMD-SHELL", "python -c \"import socket; s=socket.socket(); s.settimeout(3); s.connect(('localhost',6969)); s.close()\"" ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

  app:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      POSTGRES_HOST: db
      MCP_SERVER_URL: "http://mcp:6969/mcp" # internal Docker network
    volumes:
      - ./app:/app/app # only sync source code
      - ./alembic:/app/alembic # only sync migrations
    depends_on:
      migrate:
        condition: service_completed_successfully
      mcp:
        condition: service_healthy # wait until MCP port is actually open
    restart: unless-stopped

  frontend:
    build: .
    command: uv run streamlit run demo.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    environment:
      API_URL: "http://app:8000"
    volumes:
      - ./demo.py:/app/demo.py
    depends_on:
      app:
        condition: service_started
    restart: unless-stopped

volumes:
  postgres_data:
